services:
  postgres:
    container_name: computelearn-db
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: computelearn
      POSTGRES_PASSWORD: localdev
      POSTGRES_DB: computelearn
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U computelearn"]
      interval: 5s
      timeout: 3s
      start_period: 5s
      retries: 5

  app:
    container_name: computelearn-app
    build:
      context: .
      dockerfile: Dockerfile
    init: true
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://computelearn:localdev@postgres:5432/computelearn
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3

volumes:
  pgdata:
